#user  nobody;
# Закомментированная настройка пользователя, от имени которого должен работать Nginx

worker_processes  1;
# Количество рабочих процессов Nginx

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;
# Закомментированные варианты настройки файла логов ошибок
# notice и info — уровни подробности логирования

pid        /home/runner/workspace/logs/nginx.pid;
# Файл, в котором хранится PID главного процесса Nginx


events {
    # Блок настроек обработки соединений

    worker_connections  1024;
    # Максимальное количество соединений на один worker process
}


http {
    # Основной блок настроек HTTP-сервера

    include       mime.types;
    # Подключает файл mime.types
    # Он нужен, чтобы Nginx понимал типы файлов: HTML, CSS, JS, PNG и т.д.

    default_type  application/octet-stream;
    # Тип данных по умолчанию, если Nginx не смог определить MIME-тип файла

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';
    # Закомментированный формат логов access_log
    # Он описывает, какие данные записывать о каждом HTTP-запросе

    access_log  /home/runner/workspace/logs/access.log;
    # Файл, куда будут записываться логи HTTP-запросов

    sendfile        on;
    # Включает эффективную отправку файлов через системный вызов sendfile

    #tcp_nopush     on;
    # Закомментированная оптимизация отправки TCP-пакетов

    #keepalive_timeout  0;
    # Закомментированный вариант отключения keep-alive соединений

    keepalive_timeout  65;
    # Время в секундах, в течение которого соединение с клиентом остаётся открытым

    #gzip  on;
    # Закомментированное включение gzip-сжатия ответов

    server {
        # Блок настроек конкретного виртуального сервера

        listen       8080;
        # Nginx слушает входящие HTTP-запросы на порту 8080

        server_name  localhost;
        # Имя сервера — localhost

        #charset koi8-r;
        # Закомментированная настройка кодировки ответа

        #access_log  logs/host.access.log  main;
        # Закомментированный отдельный access log для этого server-блока

        location / {
            # Правило для всех запросов, начинающихся с /

            proxy_pass   http://127.0.0.1:8181;
            # Проксирует запросы на приложение, работающее локально на порту 8181
        }

        #error_page  404              /404.html;
        # Закомментированная настройка страницы ошибки 404

        # redirect server error pages to the static page /50x.html
        # Комментарий: ошибки сервера будут перенаправляться на страницу /50x.html

        error_page   500 502 503 504  /50x.html;
        # Для ошибок 500, 502, 503 и 504 отдаёт страницу /50x.html

        location = /50x.html {
            # Точное правило только для пути /50x.html

            root   html;
            # Искать файл 50x.html нужно в директории html
        }

    }
    # Конец server-блока

}
# Конец http-блока