worker_processes 1;
error_log /dev/stderr;
pid       /home/runner/workspace/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    access_log /dev/stdout;

    client_body_temp_path /home/runner/workspace/logs/client_body_temp;
    proxy_temp_path       /home/runner/workspace/logs/proxy_temp;
    fastcgi_temp_path     /home/runner/workspace/logs/fastcgi_temp;
    uwsgi_temp_path       /home/runner/workspace/logs/uwsgi_temp;
    scgi_temp_path        /home/runner/workspace/logs/scgi_temp;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 5000;
        server_name localhost;

        # Jupyter at /jupyter/
        location /jupyter/ {
            proxy_pass         http://127.0.0.1:5002/jupyter/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # Flask at /
        location / {
            proxy_pass       http://127.0.0.1:5001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
